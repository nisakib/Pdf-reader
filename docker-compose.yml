version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-openai}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-openai}
    volumes:
      - ./data:/data
    depends_on:
      - redis

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  redis_data:
